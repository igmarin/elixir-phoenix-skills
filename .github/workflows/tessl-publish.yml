name: Tessl Plugin Publish

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "docs/**"
      - ".tessl-plugin/plugin.json"
      - ".github/workflows/tessl-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tessl-publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Tessl
        uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          version: "0.87.0"
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Generate Tessl eval scenarios
        id: generate_scenarios
        run: |
          echo "Starting scenario generation..."
          generation_output=$(tessl scenario generate --json .)
          echo "Raw generation output:"
          echo "$generation_output"
          # Tessl prints progress lines (e.g., "- Packing and uploading plugin...")
          # before the JSON payload, so strip those before parsing.
          generation_id=$(echo "$generation_output" | ruby -rjson -e '
            json = STDIN.read.lines.reject { |line| line.start_with?("-") }.join
            puts JSON.parse(json)["generationId"]
          ')
          if [ -z "$generation_id" ]; then
            echo "::error::Unable to extract scenario generation ID"
            exit 1
          fi
          echo "generation_id=$generation_id" >> "$GITHUB_OUTPUT"
          echo "Generation ID: $generation_id"

      - name: Wait for scenario generation to complete
        run: |
          generation_id="${{ steps.generate_scenarios.outputs.generation_id }}"
          max_attempts=60
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            status_output=$(tessl scenario view --json "$generation_id" 2>&1)
            # Strip Tessl progress lines ("- Fetching generation...") before parsing JSON.
            status=$(echo "$status_output" | ruby -rjson -e '
              json = STDIN.read.lines.reject { |line| line.start_with?("-") }.join
              puts JSON.parse(json).dig("data", "attributes", "status")
            ')
            echo "Attempt $((attempt + 1)): Status is $status"

            if [ "$status" = "completed" ]; then
              echo "Scenario generation completed successfully"
              exit 0
            elif [ "$status" = "failed" ]; then
              echo "::error::Scenario generation failed"
              echo "$status_output"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 10
          done

          echo "::error::Scenario generation timed out after $max_attempts attempts"
          exit 1

      - name: Download Tessl eval scenarios
        run: |
          generation_id="${{ steps.generate_scenarios.outputs.generation_id }}"
          echo "Downloading scenarios from generation $generation_id..."
          tessl scenario download "$generation_id" --output evals --strategy replace

      - name: Compute automatic patch version
        id: version
        run: |
          plugin_name="$(ruby -rjson -e 'puts JSON.parse(File.read(".tessl-plugin/plugin.json")).fetch("name")')"
          local_version="$(ruby -rjson -e 'puts JSON.parse(File.read(".tessl-plugin/plugin.json")).fetch("version")')"

          if info_output="$(tessl plugin info "$plugin_name" 2>&1)"; then
            latest_version="$(printf '%s\n' "$info_output" | awk '/Latest Version/ {print $NF}')"
            if [ -z "$latest_version" ]; then
              echo "::error::Unable to determine latest published version for $plugin_name"
              exit 1
            fi
          else
            if printf '%s\n' "$info_output" | grep -qi '404'; then
              latest_version=""
            else
              echo "::error::Failed to query Tessl registry for $plugin_name: $info_output"
              exit 1
            fi
          fi

          version="$(ruby -e '
            local = ARGV.fetch(0)
            latest = ARGV.fetch(1)

            def parts(version)
              values = version.to_s.split(".").map(&:to_i)
              abort "invalid semver: #{version}" unless values.length == 3
              values
            end

            if latest.empty?
              puts local
            elsif (parts(local) <=> parts(latest)) == 1
              puts local
            else
              major, minor, patch = parts(latest)
              puts [major, minor, patch + 1].join(".")
            end
          ' "$local_version" "$latest_version")"

          VERSION="$version" ruby -rjson -e '
            path = ".tessl-plugin/plugin.json"
            data = JSON.parse(File.read(path))
            data["version"] = ENV.fetch("VERSION")
            File.write(path, "#{JSON.pretty_generate(data)}\n")
          '

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing $plugin_name@$version"

      - name: Commit automatic version bump
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .tessl-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "plugin.json already contains version $VERSION"
          else
            git commit -m "Bump Tessl plugin to $VERSION [skip ci]"
            git push origin HEAD:main
          fi

      - name: Publish plugin
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          plugin_name="$(ruby -rjson -e 'puts JSON.parse(File.read(".tessl-plugin/plugin.json")).fetch("name")')"
          max_attempts=3
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if tessl plugin publish .; then
              echo "Plugin published successfully"
              exit 0
            fi

            # The CLI may time out after the server has already accepted the
            # publish. Verify the registry before retrying to avoid duplicate
            # publishes or wasted retries.
            if tessl plugin info "$plugin_name@$VERSION" >/dev/null 2>&1; then
              echo "Version $plugin_name@$VERSION is already published; treating as success"
              exit 0
            fi

            attempt=$((attempt + 1))
            if [ $attempt -lt $max_attempts ]; then
              echo "Publish attempt $attempt failed; retrying in 30 seconds..."
              sleep 30
            fi
          done

          echo "::error::Plugin publish failed after $max_attempts attempts"
          exit 1

      - name: Create matching Git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git fetch --tags

          tag="v$VERSION"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists; skipping."
          else
            git tag -a "$tag" -m "Tessl plugin $tag"
            git push origin "$tag"
          fi
