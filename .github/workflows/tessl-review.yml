name: Tessl Skill Review

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'tessl.json'
      - '.tessl-plugin/**'
      - 'scripts/changed-tessl-skill-paths.rb'
      - '.github/workflows/tessl-review.yml'

permissions:
  contents: read

concurrency:
  group: tessl-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Tessl
        uses: tesslio/setup-tessl@25ec223fc0da33b41b8044ff5ab2b85235f4f91e # v2
        with:
          version: "0.87.0"
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Generate and validate Tessl eval scenarios
        id: generate_scenarios
        run: |
          echo "Starting scenario generation..."
          generation_output=$(tessl scenario generate --json .)
          echo "Raw generation output:"
          echo "$generation_output"
          # Tessl prints progress lines (e.g., "- Packing and uploading plugin...")
          # before the JSON payload, so strip those before parsing.
          generation_id=$(echo "$generation_output" | ruby -rjson -e '
            json = STDIN.read.lines.reject { |line| line.start_with?("-") }.join
            puts JSON.parse(json)["generationId"]
          ')
          if [ -z "$generation_id" ]; then
            echo "::error::Unable to extract scenario generation ID"
            exit 1
          fi
          echo "generation_id=$generation_id" >> "$GITHUB_OUTPUT"
          echo "Generation ID: $generation_id"

          max_attempts=60
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            status_output=$(tessl scenario view --json "$generation_id" 2>&1)
            # Strip Tessl progress lines ("- Fetching generation...") before parsing JSON.
            status=$(echo "$status_output" | ruby -rjson -e '
              json = STDIN.read.lines.reject { |line| line.start_with?("-") }.join
              puts JSON.parse(json).dig("data", "attributes", "status")
            ')
            echo "Attempt $((attempt + 1)): Status is $status"

            if [ "$status" = "completed" ]; then
              echo "Scenario generation completed successfully"
              exit 0
            elif [ "$status" = "failed" ]; then
              echo "::error::Scenario generation failed"
              echo "$status_output"
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep 10
          done

          echo "::error::Scenario generation timed out after $max_attempts attempts"
          exit 1

      - name: Download Tessl eval scenarios
        env:
          GENERATION_ID: ${{ steps.generate_scenarios.outputs.generation_id }}
        run: |
          generation_id="$GENERATION_ID"
          echo "Downloading scenarios from generation $generation_id..."
          tessl scenario download "$generation_id" --output evals --strategy replace

      - name: Find changed publishable skills
        id: changed
        run: |
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" > changed-files.txt
          ruby scripts/changed-tessl-skill-paths.rb < changed-files.txt > changed-skill-paths.txt
          if [ -s changed-skill-paths.txt ]; then
            echo "has_changed_skills=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changed_skills=false" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "paths<<EOF"
            cat changed-skill-paths.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Review changed publishable skills
        if: steps.changed.outputs.has_changed_skills == 'true'
        run: |
          while IFS= read -r skill_path; do
            [ -z "$skill_path" ] && continue
            echo "Reviewing $skill_path"
            tessl skill review "$skill_path" --threshold 80
          done < changed-skill-paths.txt

      - name: No publishable skills changed
        if: steps.changed.outputs.has_changed_skills != 'true'
        run: echo "No publishable Tessl skills changed; skipping Tessl skill review."
